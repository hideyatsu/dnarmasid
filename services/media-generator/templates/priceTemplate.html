<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>DnarMasID - Harga Emas Antam</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #B89965;
            --text-gray-medium: #757575;
            --text-gray-dark: #404040;
            --text-black: #1A1A1A;
            --color-green: #22A042;
            --color-red: #D93025;
            --footer-bg: transparent;
            --footer-text: #1A1A1A;
            --telegram-blue: #24A1DE;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            width: 1080px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #17181c;
        }

        .post-container {
            width: 1080px;
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background: radial-gradient(circle at 30% 30%, #F5E8D3 0%, #E3CFA8 45%, #C2A67A 100%);
            overflow: hidden;
        }

        /* --- ORNAMEN GEOMETRIS BACKGROUND --- */
        .bg-ornament {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }

        .circle-top-right {
            width: 972px;
            height: 972px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: -324px;
            right: -324px;
        }

        .diamond-bottom-left {
            width: 540px;
            height: 540px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            transform: rotate(45deg);
            bottom: -172px;
            left: -216px;
        }

        .line-accent {
            width: 1296px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(-35deg);
            top: 324px;
            right: -216px;
        }

        .header, .main-card, .footer {
            z-index: 1;
            position: relative;
        }

        .header {
            text-align: center;
            padding-top: 75px;
            width: 100%;
        }

        .header h1 {
            color: #7D5A29;
            font-size: 56px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 2px;
        }

        .header .date {
            color: #5A5A5A;
            font-size: 34px;
            font-weight: 600;
            margin: 12px 0 0;
        }

        .main-card {
            background-color: #FFFFFF;
            width: 82%;
            border-radius: 12px;
            padding: 54px 64px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 16px 54px rgba(0,0,0,0.12);
            margin-bottom: 54px;
        }

        .section {
            text-align: center;
            width: 100%;
        }

        .section.gold {
            margin-bottom: 32px;
        }

        .section.buyback {
            margin-top: 32px;
        }

        .label {
            color: var(--text-gray-dark);
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }

        .price {
            color: var(--text-black);
            font-size: 82px;
            font-weight: 800;
            margin: 8px 0;
            letter-spacing: -1px;
        }

        .change {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
        }

        .change.up, .change.diff-up { color: var(--color-green); }
        .change.down, .change.diff-down { color: var(--color-red); }
        .change.neutral, .change.diff-neutral { color: var(--text-gray-medium); }

        .change span.icon {
            display: flex;
            align-items: center;
            margin-right: 12px;
        }

        .divider {
            width: 100%;
            height: 3px;
            background-color: #EFE6D5;
            border: none;
            margin: 0;
        }

        .footer {
            background-color: var(--footer-bg);
            width: 100%;
            height: 108px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 86px 38px 86px;
            box-sizing: border-box;
        }

        .footer-left, .footer-right {
            display: flex;
            align-items: center;
        }

        .instagram-logo {
            width: 52px;
            height: 52px;
            margin-right: 18px;
            display: flex;
            align-items: center;
        }

        .instagram-handle {
            color: var(--footer-text);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .telegram-logo {
            width: 52px;
            height: 52px;
            margin-right: 13px;
            display: flex;
            align-items: center;
        }

        .telegram-link {
            color: var(--text-black);
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="post-container">
        <div class="bg-ornament circle-top-right"></div>
        <div class="bg-ornament diamond-bottom-left"></div>
        <div class="bg-ornament line-accent"></div>

        <header class="header">
            <h1>{{title}}</h1>
            <p class="date">{{date}}</p>
        </header>

        <main class="main-card">
            <div class="section gold">
                <p class="label">Harga Emas / gram</p>
                <p class="price">Rp {{price}}</p>
                <div class="change {{priceDiffClass}}">
                    <span class="icon">{{priceDiffIcon}}</span>
                    <span class="value">Rp {{priceDiffText}}</span>
                </div>
            </div>

            <hr class="divider">

            <div class="section buyback">
                <p class="label">Buyback / gram</p>
                <p class="price">Rp {{buyback}}</p>
                <div class="change {{buybackDiffClass}}">
                    <span class="icon">{{buybackDiffIcon}}</span>
                    <span class="value">Rp {{buybackDiffText}}</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-left">
                <div class="instagram-logo">
                    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

                            <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">

                                <stop offset="50%" stop-color="#FF0169"/>
                                <stop offset="75%" stop-color="#D300C5"/>
                                <stop offset="100%" stop-color="#7638FA"/>
                            </linearGradient>
                        </defs>

                        <path fill="url(#ig-grad)" d="M256,127.348A128.652,128.652,0,1,0,384.652,256,128.652,128.652,0,0,0,256,127.348Zm0,212.148A83.495,83.495,0,1,1,339.495,256,83.495,83.495,0,0,1,256,339.495Z"/>
                        <circle fill="url(#ig-grad)" cx="390.476" cy="121.524" r="30.23"/>
                    </svg>
                </div>
                <div class="instagram-handle">DnarMasID</div>
            </div>

            <div class="footer-right">
                <div class="telegram-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#24A1DE" d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                    </svg>
                </div>
                <div class="telegram-link">t.me/antamdailybot</div>
            </div>
        </footer>
    </div>

    <script>
        // Conditional Title Logic per user request
        const botTitle = "{{title}}";
        const h1 = document.querySelector('h1');

        if (botTitle.toLowerCase().includes('penutupan')) {
            h1.innerText = "HARGA PENUTUPAN";
        } else {
            h1.innerText = "HARGA EMAS ANTAM";
        }
    </script>

</body>
</html>
