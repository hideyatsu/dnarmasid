# ================================
# DnarMasID — Docker Compose
# ================================
# Services:
#   1. mysql          — database utama
#   2. redis          — message queue antar service
#   3. scheduler      — trigger pipeline harian (cron)
#   4. scraper        — ambil harga emas dari antam
#   5. ai-generator   — generate caption semua platform
#   6. media-generator — buat gambar & video
#   7. telegram-bot   — kirim hasil ke bot/channel

services:

  # ─────────────────────────────────────────
  # INFRASTRUKTUR
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${DOCKER_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dnarmasid-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - redis-data:/data
    networks:
      - dnarmasid-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-scheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net

  scraper:
    build:
      context: .
      dockerfile: services/scraper/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-scraper
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────

  ai-generator:
    build:
      context: .
      dockerfile: services/ai-generator/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-ai-generator
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net

  media-generator:
    build:
      context: .
      dockerfile: services/media-generator/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-media-generator
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media-data:/app/volumes/media
    networks:
      - dnarmasid-net

  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-telegram-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media-data:/app/volumes/media
    networks:
      - dnarmasid-net

  repliz-uploader:
    build:
      context: .
      dockerfile: services/repliz-uploader/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-repliz-uploader
    restart: unless-stopped
    env_file: .env
    environment:
      REPLIZ_FACEBOOK_ACCOUNT_ID: 69ce93c0fcfb33df528b2bb9
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net

  # Asynq monitoring dashboard (optional, enable when USE_ASYNQ=true)
  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: ${COMPOSE_PROJECT_NAME}-asynqmon
    restart: unless-stopped
    ports:
      - "${ASYNQMON_PORT:-8085}:8080"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net
    profiles:
      - asynq

  # Asynq worker (Phase 3+: shadow mode by default)
  asynq-worker:
    build:
      context: .
      dockerfile: services/asynq-worker/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-asynq-worker
    restart: unless-stopped
    env_file: .env
    environment:
      ASYNQ_SHADOW_MODE: ${ASYNQ_SHADOW_MODE:-true}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dnarmasid-net
    profiles:
      - asynq

networks:
  dnarmasid-net:
    name: ${COMPOSE_PROJECT_NAME}-net
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  media-data: